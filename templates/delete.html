<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>削除確認</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 500px;
    margin: 80px auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #d9534f;
}

.info {
    text-align: left;
    margin: 20px 0;
    padding: 15px;
    background: #f9f9f9;
    border-radius: 8px;
}

button {
    background: #d9534f;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #c9302c;
}

.back {
    margin-top: 15px;
    display: inline-block;
    color: #555;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

{% if data %}

    <h2>削除確認</h2>

    <div class="info">
        <p><b>日付：</b>{{ data[1] }}</p>
        <p><b>時間：</b>{{ data[2] }}</p>
        <p><b>名前：</b>{{ data[3] }}</p>
        <p><b>電話：</b>{{ data[4] }}</p>
        <p><b>住所：</b>{{ data[5] }}</p>
    </div>

    <form method="POST">

        <input type="hidden" name="date" value="{{ data[1] }}">
        <input type="hidden" name="time" value="{{ data[2] }}">
        <input type="hidden" name="name" value="{{ data[3] }}">
        <input type="hidden" name="phone" value="{{ data[4] }}">
        <input type="hidden" name="address" value="{{ data[5] }}">

        <button type="submit"
                onclick="return confirm('本当に削除しますか？')">
            削除する
        </button>

    </form>

{% else %}

    <h2>削除対象なし</h2>
    <p>現在、削除できる予約はありません。</p>

{% endif %}

    <a class="back" href="/">← 戻る</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ガス点検予約受付</title>

<link rel="stylesheet" href="/static/style.css">

<style>
body {
    background: #f5f5f5;
}

.container {
    max-width: 400px;
    margin: auto;
    text-align: center;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* ★ラベル */
.label {
    text-align: left;
    font-size: 14px;
    margin-top: 10px;
}

/* ★入力統一 */
input, select, button {
    width: 100%;
    padding: 14px;
    margin-top: 5px;
    font-size: 16px;
    box-sizing: border-box;
}

button {
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

<h2>ガス点検予約受付</h2>

<div class="card">

<form method="POST" onsubmit="return validateForm()">

<!-- 消費者コード -->
<div class="label">消費者コード(ハイフン入力不要・11桁)</div>
<input 
    type="tel"
    inputmode="numeric"
    name="consumer_code" 
    id="consumer_code"
    placeholder="00000000000"
    maxlength="11"
    required
>

<!-- 操作 -->
<div class="label">操作を選択</div>
<select name="action" required>
<option value="">選択してください</option>
<option value="新規">新規予約</option>
<option value="変更">予約変更</option>
<option value="削除">予約削除</option>
</select>

<button type="submit">進む</button>

</form>

</div>

</div>

<script>
const input = document.getElementById("consumer_code");

input.addEventListener("input", function(e) {
    e.target.value = e.target.value.replace(/[^0-9]/g, "");
});

input.addEventListener("blur", function(e) {

    let v = e.target.value;

    if (v.length === 11) {
        v = v.slice(0,3) + "-" + v.slice(3,7) + "-" + v.slice(7);
    }

    e.target.value = v;
});

function validateForm(){

    let v = document.getElementById("consumer_code").value;

    // ハイフン除去
    v = v.replace(/-/g, "");

    // 11桁チェック
    if(!/^\d{11}$/.test(v)){
        alert("消費者コードは11桁の数字で入力してください");
        return false;
    }

    return true;
}

</script>

</body>
</html>
